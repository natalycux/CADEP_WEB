<div class="modal fade" id="donationModal" tabindex="-1" aria-labelledby="donationModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body">

                <div class="modal-image-area">
                    <img src="assets/img/Foto5.jpg" alt="Niño en terapia">
                </div>

                <div class="modal-form-area">

                    <div class="form-header">
                        <h5 id="donationModalLabel">APOYA NUESTRA CAUSA</h5>
                        <p class="text-muted small"><i class="bi bi-lock-fill"></i> Tu donación se procesa de forma segura.</p>
                    </div>

                    <div class="form-main">
                        <div class="w-100 mb-3">
                            <input type="radio" class="btn-check" name="modal-donation-type" id="modal-onetime" autocomplete="off" checked>
                            <label class="btn btn-danger w-100" for="modal-onetime">DONACIÓN ÚNICA</label>
                        </div>
                        <div class="d-flex gap-2 flex-wrap mb-3 justify-content-center">
                            <button class="btn btn-outline-secondary amount" data-value="5">$5</button>
                            <button class="btn btn-outline-secondary amount" data-value="20">$20</button>
                            <button class="btn btn-outline-secondary amount" data-value="50">$50</button>
                            <button class="btn btn-outline-secondary amount" data-value="100">$100</button>
                        </div>
                        <br>
                        <label class="form-label small">O ingresa otra cantidad</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="modalDonationInput" placeholder="Valor">
                        </div>
                        <div id="modal-amount-error" class="text-danger small mt-2 d-none" style="min-height: 20px;"></div>
                    </div>

                    <div class="form-footer">
                        <button class="btn btn-danger w-100 btn-lg">
                            <i class="bi bi-heart-fill me-1"></i> DONAR AHORA
                        </button>
                        <div class="text-center mt-2">
                            <img src="assets/img/Pago.png" height="65" alt="Métodos de pago">
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
