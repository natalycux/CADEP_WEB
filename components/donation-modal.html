<!-- Modal de Donación -->
<div class="modal fade" id="donationModal" tabindex="-1" aria-labelledby="donationModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="donationModalLabel">APOYA NUESTRA CAUSA</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-0">
                <div class="row g-0">
                    <!-- Columna de la imagen -->
                    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center p-0">
                        <img src="assets/img/Foto5.jpg" class="img-fluid modal-image" alt="Niño en terapia">
                    </div>
                    <!-- Columna del formulario -->
                    <div class="col-md-6 p-3">
                        <p class="text-muted small"><i class="bi bi-lock-fill"></i> Tu donación se procesa de forma segura.</p>
                        
                        <div class="btn-group w-100 mb-3" role="group">
                            <input type="radio" class="btn-check" name="modal-donation-type" id="modal-onetime" autocomplete="off" checked>
                            <label class="btn btn-outline-danger" for="modal-onetime">DONAR <br> UNA VEZ</label>

                            <input type="radio" class="btn-check" name="modal-donation-type" id="modal-monthly" autocomplete="off">
                            <label class="btn btn-outline-danger" for="modal-monthly">APADRINAR <br> MENSUALMENTE</label>
                        </div>

                        <div class="d-flex gap-2 flex-wrap mb-3 justify-content-center">
                            <button class="btn btn-outline-secondary amount" data-value="5">$5</button>
                            <button class="btn btn-outline-secondary amount" data-value="20">$20</button>
                            <button class="btn btn-outline-secondary amount" data-value="50">$50</button>
                            <button class="btn btn-outline-secondary amount" data-value="100">$100</button>
                        </div>

                        <label class="form-label small">O ingresa otra cantidad</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="modalDonationInput" placeholder="Valor">
                        </div>
                        <button class="btn btn-danger w-100 btn-lg">
                            <i class="bi bi-heart-fill me-1"></i> DONAR AHORA
                        </button>
                        <div class="text-center mt-2">
                            <img src="assets/img/Pago.png" height="65" alt="Métodos de pago">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
