<div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header d-block border-0 pt-4 px-4">
                
                <div class="text-center mb-2">
                    <h5 class="modal-title" id="paymentModalLabel">Completa tu Donación</h5>
                    <p class="mb-0 text-muted">Estás a un paso de ayudar.</p>
                </div>
                <div class="progress" style="height: 8px;">
                    <div class="progress-bar bg-danger" role="progressbar" style="width: 50%;" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>

            <div class="modal-body px-4 pb-4">
                <div class="mx-auto" style="max-width: 650px;">
                    <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
                        <h6 class="m-0">Información Personal</h6>
                        <p class="m-0">Monto: <span id="summary-amount" class="fw-bold text-danger">$20.00</span></p>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6"><label for="firstName" class="form-label">Nombre</label><input type="text" class="form-control" id="firstName" required></div>
                        <div class="col-md-6"><label for="lastName" class="form-label">Apellido</label><input type="text" class="form-control" id="lastName" required></div>
                        <div class="col-12"><label for="email" class="form-label">Email</label><input type="email" class="form-control" id="email" required></div>
                        <div class="col-md-6"><label for="country" class="form-label">País</label><select id="country" class="form-select"><option selected>Guatemala</option><option>Estados Unidos</option><option>México</option><option>El Salvador</option><option>Honduras</option></select></div>
                        <div class="col-md-6"><label for="phone" class="form-label">Teléfono</label><div class="input-group"><span class="input-group-text">+502</span><input type="tel" class="form-control" id="phone"></div></div>
                    </div>

                    <h6 class="mb-3">Método de Pago</h6>
                    <div class="d-flex gap-3 mb-3 payment-method-selector">
                        <button class="payment-method-btn active" data-bs-target="#pills-card">
                            <i class="bi bi-credit-card-fill"></i>
                            <span>Tarjeta</span>
                        </button>
                        <button class="payment-method-btn" data-bs-target="#pills-paypal">
                            <i class="bi bi-paypal"></i>
                            <span>PayPal</span>
                        </button>
                    </div>
                    
                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="pills-card" role="tabpanel">
                            <div class="row g-3">
                                <div class="col-12"><label for="cardName" class="form-label">Nombre en la tarjeta</label><input type="text" class="form-control" id="cardName"></div>
                                <div class="col-12"><label for="cardNumber" class="form-label">Número de tarjeta</label><input type="text" class="form-control" id="cardNumber"></div>
                                <div class="col-md-6"><label for="cardExpiry" class="form-label">Vencimiento (MM/AA)</label><input type="text" class="form-control" id="cardExpiry" placeholder="MM/AA"></div>
                                <div class="col-md-6"><label for="cardCVC" class="form-label">CVC</label><input type="text" class="form-control" id="cardCVC"></div>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="pills-paypal" role="tabpanel">
                             <div class="text-center p-4 border rounded">
                                <p class="small text-muted mb-3">Serás redirigido a PayPal para completar tu donación de forma segura.</p>
                                <img src="https://www.paypalobjects.com/webstatic/mktg/logo/AM_SbyPP_H_h_rgb_bl.png" alt="PayPal" height="30">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <button class="btn btn-link text-secondary" type="button" id="back-to-donation-modal">
                            <i class="bi bi-arrow-left me-1"></i>Volver
                        </button>
                        <button class="btn btn-danger btn-lg" type="button" id="complete-donation-btn">Completar Donación</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
